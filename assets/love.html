<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sai Krishna ❤️ Anjali</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0015, #1a0025, #0a0015);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            position: relative;
        }

        /* Floating hearts background */
        .hearts {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .heart {
            position: absolute;
            bottom: -40px;
            color: rgba(255, 60, 120, 0.15);
            font-size: 20px;
            animation: floatHeart 8s linear infinite;
        }
        @keyframes floatHeart {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.2); opacity: 0; }
        }

        /* Main love text */
        .love-text {
            font-size: clamp(32px, 8vw, 80px);
            font-weight: 700;
            color: #ff3d7f;
            letter-spacing: 2px;
            line-height: 1.4;
            text-shadow: 0 0 40px rgba(255, 60, 120, 0.3), 0 0 80px rgba(255, 60, 120, 0.1);
        }

        .love-text .line {
            display: block;
            opacity: 0;
            transform: translateY(40px);
            animation: fadeUpDown 4s ease-in-out infinite;
        }

        .love-text .line:nth-child(1) { animation-delay: 0s; }
        .love-text .line:nth-child(2) { animation-delay: 1.8s; }
        .love-text .line:nth-child(3) { animation-delay: 3.6s; }

        @keyframes fadeUpDown {
            0%   { opacity: 0; transform: translateY(40px); }
            15%  { opacity: 1; transform: translateY(0); }
            40%  { opacity: 1; transform: translateY(0); }
            55%  { opacity: 0; transform: translateY(-40px); }
            100% { opacity: 0; transform: translateY(-40px); }
        }

        /* Heart symbol between lines */
        .heart-icon {
            display: block;
            font-size: clamp(24px, 4vw, 50px);
            opacity: 0;
            transform: scale(0);
            animation: heartPop 4s ease-in-out infinite;
        }
        .heart-icon:nth-child(2) { animation-delay: 0s; }  /* between line 1 & 3 */
        .heart-icon:nth-child(4) { animation-delay: 1.8s; } /* between line 3 & 5 */

        @keyframes heartPop {
            0%   { opacity: 0; transform: scale(0); }
            10%  { opacity: 0; transform: scale(0); }
            20%  { opacity: 1; transform: scale(1.2); }
            25%  { transform: scale(1); }
            40%  { opacity: 1; transform: scale(1); }
            55%  { opacity: 0; transform: scale(0.5); }
            100% { opacity: 0; transform: scale(0); }
        }

        /* Glow ring behind text */
        .glow-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 60, 120, 0.08) 0%, transparent 70%);
            animation: pulseGlow 4s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes pulseGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }

        /* Sub text */
        .sub {
            margin-top: 50px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 2s ease forwards;
            animation-delay: 7s;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>

    <div class="container">
        <div class="glow-ring"></div>

        <div class="love-text">
            <span class="line">sai krishna</span>
            <span class="heart-icon">❤️</span>
            <span class="line">loves</span>
            <span class="heart-icon">❤️</span>
            <span class="line">anjali</span>
        </div>

        <div class="sub">✦ forever & always ✦</div>
    </div>

    <script>
        // Floating hearts
        const container = document.getElementById('hearts');
        const symbols = ['♥', '✦', '♡', '❤'];
        for (let i = 0; i < 20; i++) {
            const h = document.createElement('span');
            h.className = 'heart';
            h.textContent = symbols[i % symbols.length];
            h.style.left = Math.random() * 100 + '%';
            h.style.fontSize = (10 + Math.random() * 20) + 'px';
            h.style.animationDuration = (6 + Math.random() * 6) + 's';
            h.style.animationDelay = (Math.random() * 8) + 's';
            container.appendChild(h);
        }
    </script>
</body>
</html>
